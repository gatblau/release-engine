apiVersion: infrastructure.platform.io/v1alpha1
kind: XDatabase
metadata:
  name: appdb
  namespace: platform-dev
spec:
  providerConfigRef: aws-provider
  region: eu-west-1
  engine: postgres
  engineVersion: "16.3"
  instanceClass: db.r6g.large
  allocatedStorage: 100
  storageType: gp3
  multiAZ: true
  backupRetentionDays: 7
  parameterGroup: custom-postgres16
  maintenanceWindow: Mon:03:00-Mon:04:00
  subnetGroupName: platform-db-private
  securityGroupIds:
    - sg-0123456789abcdef0
    - sg-0fedcba9876543210
