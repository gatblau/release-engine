apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xcdns.infrastructure.platform.io
spec:
  group: infrastructure.platform.io
  names:
    kind: XCDN
    plural: xcdns
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [parameters]
              properties:
                parameters:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  required: [origins]
                  properties:
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                      description: "FinOps tags applied to all resources in this capability"
                    origins:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        required: [name, domainName]
                        properties:
                          name:
                            type: string
                          domainName:
                            type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
