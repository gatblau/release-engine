apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: cache-aws
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: infrastructure.platform.io/v1alpha1
    kind: XCache
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          options:
            - missingkey=error
          template: |
            ---
            apiVersion: elasticache.aws.m.upbound.io/v1beta1
            kind: ReplicationGroup
            metadata:
              namespace: {{ .observed.composite.resource.metadata.namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: replication-group
                crossplane.io/external-name: {{ printf "%s-cache" .observed.composite.resource.metadata.name | quote }}
            spec:
              providerConfigRef:
                name: {{ .observed.composite.resource.spec.parameters.providerConfigRef | quote }}
                kind: ClusterProviderConfig
              forProvider:
                region: {{ .observed.composite.resource.spec.parameters.region | quote }}
                engine: {{ .observed.composite.resource.spec.parameters.engine | quote }}
                nodeType: {{ .observed.composite.resource.spec.parameters.nodeType | quote }}
                numCacheClusters: {{ .observed.composite.resource.spec.parameters.replicaCount }}
                automaticFailoverEnabled: true
                atRestEncryptionEnabled: true
                transitEncryptionEnabled: true
                snapshotRetentionLimit: {{ .observed.composite.resource.spec.parameters.snapshotRetentionDays }}
                {{- with .observed.composite.resource.spec.parameters.engineVersion }}
                engineVersion: {{ . | quote }}
                {{- end }}
                {{- with .observed.composite.resource.spec.parameters.subnetGroupName }}
                subnetGroupName: {{ . | quote }}
                {{- end }}
                {{- with .observed.composite.resource.spec.parameters.securityGroupIds }}
                securityGroupIds:
                {{- range . }}
                  - {{ . | quote }}
                {{- end }}
                {{- end }}
            ---
            apiVersion: infrastructure.platform.io/v1alpha1
            kind: XCache
            status:
              {{- $rg := getComposedResource . "replication-group" }}
              {{- if $rg }}
              {{- $at := index $rg.resource "status" "atProvider" }}
              {{- if $at }}
              {{- with index $at "primaryEndpointAddress" }}
              endpoint: {{ . | quote }}
              {{- end }}
              {{- with index $at "port" }}
              port: {{ . }}
              {{- end }}
              {{- end }}
              {{- end }}
    - step: ready
      functionRef:
        name: function-auto-ready
