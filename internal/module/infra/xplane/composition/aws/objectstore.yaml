apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: objectstore-aws
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: infrastructure.platform.io/v1alpha1
    kind: XObjectStore
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          options:
            - missingkey=error
          template: |
            {{- $xr := getCompositeResource . -}}
            {{- $params := $xr.spec.parameters -}}
            {{- $region := default "eu-west-1" $params.region -}}
            {{- $providerConfigName := "aws-provider" -}}
            {{- $providerConfigKind := "ClusterProviderConfig" -}}
            {{- if $params.providerConfigRef }}
            {{- $providerConfigName = default "aws-provider" $params.providerConfigRef.name -}}
            {{- $providerConfigKind = default "ClusterProviderConfig" $params.providerConfigRef.kind -}}
            {{- end -}}
            {{- $bucketExternalName := printf "%s-bucket" $xr.metadata.name -}}

            ---
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: Bucket
            metadata:
              annotations:
                {{ setResourceNameAnnotation "s3-bucket" }}
                crossplane.io/external-name: {{ $bucketExternalName }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigName }}
                kind: {{ $providerConfigKind }}
              forProvider:
                region: {{ $region }}
                tags:
                {{- with $params.tags }}
                {{- toYaml . | nindent 16 }}
                {{- end }}

            ---
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketVersioning
            metadata:
              annotations:
                {{ setResourceNameAnnotation "s3-bucket-versioning" }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigName }}
                kind: {{ $providerConfigKind }}
              forProvider:
                region: {{ $region }}
                bucketSelector:
                  matchControllerRef: true
                versioningConfiguration:
                  - status: {{ if $params.versioning }}Enabled{{ else }}Suspended{{ end }}

            {{- if $params.encryption }}
            ---
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketServerSideEncryptionConfiguration
            metadata:
              annotations:
                {{ setResourceNameAnnotation "s3-bucket-encryption" }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigName }}
                kind: {{ $providerConfigKind }}
              forProvider:
                region: {{ $region }}
                bucketSelector:
                  matchControllerRef: true
                rule:
                  - applyServerSideEncryptionByDefault:
                      - sseAlgorithm: aws:kms
            {{- end }}

            ---
            apiVersion: s3.aws.m.upbound.io/v1beta1
            kind: BucketPublicAccessBlock
            metadata:
              annotations:
                {{ setResourceNameAnnotation "s3-public-access-block" }}
            spec:
              providerConfigRef:
                name: {{ $providerConfigName }}
                kind: {{ $providerConfigKind }}
              forProvider:
                region: {{ $region }}
                bucketSelector:
                  matchControllerRef: true
                blockPublicAcls: true
                blockPublicPolicy: true
                ignorePublicAcls: true
                restrictPublicBuckets: true

            {{- $bucket := getComposedResource . "s3-bucket" -}}
            {{- $bucketName := "" -}}
            {{- $bucketArn := "" -}}
            {{- if $bucket }}
            {{- $bucketName = dig "resource" "status" "atProvider" "id" "" $bucket -}}
            {{- $bucketArn = dig "resource" "status" "atProvider" "arn" "" $bucket -}}
            {{- end }}

            ---
            apiVersion: infrastructure.platform.io/v1alpha1
            kind: XObjectStore
            status:
              bucketName: {{ $bucketName | quote }}
              bucketArn: {{ $bucketArn | quote }}
    - step: auto-ready
      functionRef:
        name: function-auto-ready
