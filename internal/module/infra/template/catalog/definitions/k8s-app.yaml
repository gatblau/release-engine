name: k8s-app
description: "Kubernetes application and optional data/platform services"
version: "1.0"
composition_ref: "composition-k8s-application-v1"

required_capabilities:
  - kubernetes

optional_capabilities:
  - database
  - cache
  - object_storage
  - block_storage
  - file_storage
  - vpc
  - load_balancer
  - dns
  - cdn
  - messaging
  - identity
  - secrets
  - observability

forbidden_capabilities:
  - vm

constraints:
  allowed_environments: [development, staging, production]
  allowed_workload_profiles: [small, medium, large, xlarge]
  allowed_availabilities: [standard, high, critical]
  allowed_residencies: [eu, us, ap, global]
  requires_approval: false
  max_cost_monthly: 50000

defaults:
  kubernetes_tier: standard
  composition_ref: composition-k8s-application-v1
