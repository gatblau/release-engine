apiVersion: infrastructure.platform.io/v1alpha1
kind: XKubernetesCluster
metadata:
    annotations:
        platform.io/composition-ref: kubernetes-aws
        platform.io/contract-version: v1
    labels:
        app.kubernetes.io/managed-by: release-engine
        platform.io/catalogue-item: data-proc
        platform.io/environment: production
        platform.io/tenant: analytics
    name: data-pipeline-prod-kubernetes
    namespace: platform-system
spec:
    compositionRef:
        name: kubernetes-aws
    parameters:
        clusterName: data-pipeline-prod-k8s
        enableOIDC: true
        nodePool:
            capacityType: ON_DEMAND
            desiredNodes: 2
            diskSizeGb: 50
            instanceType: m7.2xlarge
            maxNodes: 40
            minNodes: 3
        providerConfigRef: aws-provider
        publicAccess: false
        region: eu-west-1
        securityGroupIds: []
        subnetIds: []
        tags:
            catalogue-item: data-proc
            cost-centre: cost-center-456
            data-classification: confidential
            environment: production
            managed-by: release-engine
            owner: data-platform
            service: data-pipeline-prod
            tenant: analytics
        version: "1.30"
---
apiVersion: infrastructure.platform.io/v1alpha1
kind: XMessaging
metadata:
    annotations:
        platform.io/composition-ref: messaging-aws
        platform.io/contract-version: v1
    labels:
        app.kubernetes.io/managed-by: release-engine
        platform.io/catalogue-item: data-proc
        platform.io/environment: production
        platform.io/tenant: analytics
    name: data-pipeline-prod-messaging
    namespace: platform-system
spec:
    compositionRef:
        name: messaging-aws
    parameters:
        dlqEnabled: true
        dlqMaxRetry: 5
        encryption: true
        fifo: false
        providerConfigRef: aws-provider
        queueCount: 4
        region: eu-west-1
        tags:
            catalogue-item: data-proc
            cost-centre: cost-center-456
            data-classification: confidential
            environment: production
            managed-by: release-engine
            owner: data-platform
            service: data-pipeline-prod
            tenant: analytics
        topicCount: 2
---
apiVersion: infrastructure.platform.io/v1alpha1
kind: XObjectStore
metadata:
    annotations:
        platform.io/composition-ref: objectstorage-aws
        platform.io/contract-version: v1
    labels:
        app.kubernetes.io/managed-by: release-engine
        platform.io/catalogue-item: data-proc
        platform.io/environment: production
        platform.io/tenant: analytics
    name: data-pipeline-prod-objectStorage
    namespace: platform-system
spec:
    compositionRef:
        name: objectstorage-aws
    parameters:
        encryption: true
        providerConfigRef: aws-provider
        region: eu-west-1
        retentionDays: 0
        tags:
            catalogue-item: data-proc
            cost-centre: cost-center-456
            data-classification: confidential
            environment: production
            managed-by: release-engine
            owner: data-platform
            service: data-pipeline-prod
            tenant: analytics
        versioning: true
