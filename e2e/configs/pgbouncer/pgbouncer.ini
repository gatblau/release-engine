[databases]
release_engine = host=postgres port=5432 dbname=release_engine user=release_engine password=release_engine

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
reserve_pool_size = 5
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
server_idle_timeout = 60
server_lifetime = 3600
server_connect_timeout = 15
server_login_retry = 2
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60
admin_users = release_engine
stats_users = release_engine