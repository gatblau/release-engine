APP_NAME = Gitea: Git with a cup of tea
RUN_USER = git
RUN_MODE = prod
WORK_PATH = /data/gitea

[server]
APP_DATA_PATH = /data/gitea
HTTP_PORT = 3000
ROOT_URL = http://localhost:3000
DOMAIN = localhost
SSH_DOMAIN = localhost
SSH_PORT = 2222
DISABLE_SSH = false
START_SSH_SERVER = true
OFFLINE_MODE = false

[database]
DB_TYPE = postgres
HOST = postgres:5432
NAME = gitea
USER = release_engine
PASSWD = release_engine
SSL_MODE = disable

[repository]
ROOT = /data/git/repositories

[repository.upload]
TEMP_PATH = /data/gitea/uploads

[repository.local]
LOCAL_COPY_PATH = /data/gitea/tmp/local-repo

[repository.pull-request]
DEFAULT_MERGE_STYLE = merge

[repository.signing]
SIGNING_KEY = none
SIGNING_BRANCHES = all

[security]
INSTALL_LOCK = true
SECRET_KEY = 8XyLrQ9qZ3wBvE2nP5tG7sJ1mK4cF6dH0aR
INTERNAL_TOKEN = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiZ2l0ZWEifQ.1234567890abcdef
DISABLE_GIT_HOOKS = false

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
ENABLE_CAPTCHA = false
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.localhost

[mailer]
ENABLED = false

[oauth2]
ENABLED = true
JWT_SECRET = dPm5f1HlxwAI-ROTGQDJNqQJL2DgcN6186USVEjSp-4

[openid]
ENABLE_OPENID_SIGNIN = true
ENABLE_OPENID_SIGNUP = false

[session]
PROVIDER = file

[log]
MODE = console
LEVEL = Info
ROOT_PATH = /data/gitea/log

[attachment]
ENABLED = true
PATH = /data/gitea/attachments

[picture]
AVATAR_UPLOAD_PATH = /data/gitea/avatars
REPOSITORY_AVATAR_PATH = /data/gitea/repo-avatars

[mirror]
DEFAULT_INTERVAL = 8h

[packages]
ENABLED = false

[metrics]
ENABLED = false

[cron]
ENABLED = true

[git]
PATH = /usr/bin/git

[git.timeout]
DEFAULT = 3600
MIGRATE = 600
MIRROR = 300
CLONE = 300
PULL = 300
GC = 60

[api]
ENABLE_SWAGGER = false
MAX_RESPONSE_ITEMS = 50

[i18n]
LANGS = en-US,zh-CN,zh-HK,zh-TW,de-DE,fr-FR,nl-NL,lv-LV,ru-RU,uk-UA,ja-JP,es-ES,pt-BR,pt-PT,pl-PL,bg-BG,it-IT,fi-FI,tr-TR,cs-CZ,sr-SP,sv-SE,ko-KR
NAMES = English,简体中文,繁體中文（香港）,繁體中文（台灣）,Deutsch,Français,Nederlands,Latviešu,Русский,Українська,日本語,Español,Português do Brasil,Português de Portugal,Polski,Български,Italiano,Suomi,Türkçe,Čeština,Српски,Svenska,한국어

[ui]
DEFAULT_THEME = auto
SHOW_USER_EMAIL = true

[admin]
DISABLE_REGULAR_ORG_CREATION = false
